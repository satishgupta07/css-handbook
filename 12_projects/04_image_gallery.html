<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <style>
      /* PROJECT 4: Masonry-like image gallery with hover overlay.
         Practices: grid auto-flow dense, aspect-ratio, hover overlays,
         object-fit, transform on hover. */

      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f0f1a;
        color: white;
        margin: 0; padding: 2rem;
        min-height: 100vh;
      }

      h1 {
        text-align: center;
        font-size: clamp(1.75rem, 3vw, 2.5rem);
        margin: 0 0 2rem;
        background: linear-gradient(90deg, #ec4899, #6366f1);
        -webkit-background-clip: text; background-clip: text;
        color: transparent;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        grid-auto-rows: 200px;
        grid-auto-flow: dense;
        gap: 1rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .item {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        cursor: pointer;
      }
      .item img {
        width: 100%; height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      .item:hover img { transform: scale(1.08); }

      .item .caption {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
        display: flex; flex-direction: column;
        justify-content: flex-end;
        padding: 1rem;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .item:hover .caption { opacity: 1; }
      .item .caption h3 {
        margin: 0 0 0.25rem;
        transform: translateY(20px);
        transition: transform 0.3s ease;
      }
      .item .caption p {
        margin: 0;
        color: #ddd;
        font-size: 0.85rem;
        transform: translateY(20px);
        transition: transform 0.3s 0.05s ease;
      }
      .item:hover .caption h3,
      .item:hover .caption p {
        transform: translateY(0);
      }

      /* feature certain items at different sizes (magazine layout) */
      .item.wide { grid-column: span 2; }
      .item.tall { grid-row: span 2; }
      .item.big  { grid-column: span 2; grid-row: span 2; }

      /* on small screens, override spans so layout doesn't break */
      @media (max-width: 600px) {
        .item.wide, .item.big { grid-column: auto; }
        .item.tall, .item.big { grid-row: auto; }
      }
    </style>
  </head>
  <body>
    <h1>Image Gallery</h1>

    <div class="gallery">
      <figure class="item big">
        <img src="https://picsum.photos/600/600?random=1" alt="" />
        <figcaption class="caption">
          <h3>Mountain Peaks</h3>
          <p>Iceland · Jan 2026</p>
        </figcaption>
      </figure>

      <figure class="item">
        <img src="https://picsum.photos/400/400?random=2" alt="" />
        <figcaption class="caption">
          <h3>Coastal Mist</h3>
          <p>Portugal</p>
        </figcaption>
      </figure>

      <figure class="item tall">
        <img src="https://picsum.photos/400/800?random=3" alt="" />
        <figcaption class="caption">
          <h3>Forest Path</h3>
          <p>Norway</p>
        </figcaption>
      </figure>

      <figure class="item wide">
        <img src="https://picsum.photos/800/400?random=4" alt="" />
        <figcaption class="caption">
          <h3>Desert Dawn</h3>
          <p>Morocco</p>
        </figcaption>
      </figure>

      <figure class="item">
        <img src="https://picsum.photos/400/400?random=5" alt="" />
        <figcaption class="caption">
          <h3>City Lights</h3>
          <p>Tokyo</p>
        </figcaption>
      </figure>

      <figure class="item">
        <img src="https://picsum.photos/400/400?random=6" alt="" />
        <figcaption class="caption">
          <h3>Lakeside</h3>
          <p>Switzerland</p>
        </figcaption>
      </figure>

      <figure class="item wide">
        <img src="https://picsum.photos/800/400?random=7" alt="" />
        <figcaption class="caption">
          <h3>Sunset Dunes</h3>
          <p>Sahara</p>
        </figcaption>
      </figure>

      <figure class="item">
        <img src="https://picsum.photos/400/400?random=8" alt="" />
        <figcaption class="caption">
          <h3>Frozen Lake</h3>
          <p>Canada</p>
        </figcaption>
      </figure>
    </div>
  </body>
</html>
