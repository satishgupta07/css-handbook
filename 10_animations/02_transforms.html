<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Transforms</title>
    <style>
      /*
        ============================================================
        CONCEPT: transform
        ============================================================
        Transforms move/rotate/scale/skew an element WITHOUT triggering
        layout reflow — they only change paint/composite. Cheap & smooth.

        2D functions:
          translate(x, y)         translate(20px, 0)        translateX, translateY
          scale(x, y)             scale(1.2)
          rotate(angle)           rotate(15deg)
          skew(x, y)              skewX(10deg), skewY(0)

        3D functions (need perspective on the parent):
          rotateX, rotateY, rotateZ
          translate3d(x,y,z)
          scale3d(...)

        Combine:
          transform: translate(20px, 10px) rotate(45deg) scale(1.1);
          (order matters — applied right-to-left: scale FIRST, then rotate,
           then translate)

        transform-origin:
          where transforms anchor.   default: 50% 50% (center)
          transform-origin: top left;     0 0
          transform-origin: 100% 50%;     right edge

        perspective + perspective-origin (for 3D):
          set on the PARENT to make 3D rotates look like real depth.
        ============================================================
      */
      body { font-family: sans-serif; padding: 1rem; }
      .row { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 2rem; }
      .box {
        width: 100px; height: 100px;
        background: #2980b9; color: white;
        display: grid; place-items: center;
        border-radius: 6px; font-size: 0.85rem;
        transition: transform 0.4s ease;
      }

      .translate:hover { transform: translate(30px, -20px); }
      .scale:hover     { transform: scale(1.4); }
      .rotate:hover    { transform: rotate(45deg); }
      .skew:hover      { transform: skew(20deg, 5deg); }
      .combo:hover     { transform: translateY(-10px) rotate(15deg) scale(1.1); }

      /* transform-origin */
      .origin {
        background: #c0392b; transform-origin: top left;
      }
      .origin:hover { transform: rotate(20deg); }

      /* 3D flip card */
      .flip-scene { perspective: 800px; }
      .flip-card {
        width: 180px; height: 240px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s;
        cursor: pointer;
      }
      .flip-scene:hover .flip-card { transform: rotateY(180deg); }
      .flip-face {
        position: absolute; inset: 0;
        backface-visibility: hidden;
        border-radius: 8px;
        display: grid; place-items: center;
        font-weight: 700; font-size: 1.1rem;
      }
      .flip-front { background: #2c3e50; color: white; }
      .flip-back  { background: #ee5a24; color: white;
                    transform: rotateY(180deg); }
    </style>
  </head>
  <body>
    <h1>Transforms (hover each box)</h1>
    <div class="row">
      <div class="box translate">translate</div>
      <div class="box scale">scale</div>
      <div class="box rotate">rotate</div>
      <div class="box skew">skew</div>
      <div class="box combo">combo</div>
      <div class="box origin">origin: top-left</div>
    </div>

    <h2>3D flip card (hover the area)</h2>
    <div class="flip-scene">
      <div class="flip-card">
        <div class="flip-face flip-front">FRONT</div>
        <div class="flip-face flip-back">BACK</div>
      </div>
    </div>
  </body>
</html>
