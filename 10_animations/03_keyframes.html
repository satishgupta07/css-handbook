<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Keyframe Animations</title>
    <style>
      /*
        ============================================================
        CONCEPT: @keyframes + animation
        ============================================================
        While transitions go from STATE A → STATE B once, animations
        play through MANY keyframes and can loop.

        1. Define keyframes:
            @keyframes name {
              from { ... }            (= 0%)
              50%  { ... }
              to   { ... }            (= 100%)
            }

        2. Apply to an element:
            animation: <name> <duration> <timing> <delay> <count> <direction> <fill-mode>;
            animation: bounce 1s ease-in-out 0s infinite alternate both;

        Sub-properties:
          animation-name
          animation-duration            1s
          animation-timing-function     ease-in-out, linear, cubic-bezier
          animation-delay               0s
          animation-iteration-count     1 | 5 | infinite
          animation-direction           normal | reverse | alternate | alternate-reverse
          animation-fill-mode
              none      revert to original after animation ends
              forwards  KEEP the final keyframe state (most common)
              backwards apply first keyframe state during delay
              both      both forwards & backwards
          animation-play-state          running | paused

        ⚠ Respect prefers-reduced-motion — see end of file.
        ============================================================
      */
      body { font-family: sans-serif; padding: 1rem; }
      .row { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 2rem;
             align-items: center; }
      .box {
        width: 80px; height: 80px;
        background: #2980b9; color: white;
        display: grid; place-items: center;
        border-radius: 6px; font-size: 0.8rem;
      }

      /* 1) bounce */
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-30px); }
      }
      .bounce { animation: bounce 1s ease-in-out infinite; }

      /* 2) spin */
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 2s linear infinite; background: #c0392b; }

      /* 3) loading dots */
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      .dots { display: inline-flex; gap: 6px; }
      .dots span {
        width: 12px; height: 12px; border-radius: 50%;
        background: #16a085;
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dots span:nth-child(2) { animation-delay: 0.2s; }
      .dots span:nth-child(3) { animation-delay: 0.4s; }

      /* 4) skeleton shimmer */
      @keyframes shimmer { from { background-position: 200% 0; }
                           to   { background-position: -200% 0; } }
      .skeleton {
        width: 240px; height: 16px; border-radius: 4px;
        background: linear-gradient(90deg, #e0e0e0 25%, #f5f5f5 50%, #e0e0e0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s linear infinite;
      }

      /* 5) entrance: fade-up on load */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up {
        animation: fadeUp 0.6s ease-out both;
      }
      .fade-up:nth-child(2) { animation-delay: 0.15s; }
      .fade-up:nth-child(3) { animation-delay: 0.3s; }

      /* 6) pause on hover */
      .pausable { animation: spin 2s linear infinite; background: #8e44ad; }
      .pausable:hover { animation-play-state: paused; }

      /* RESPECT user preference — disable animation if they ask */
      @media (prefers-reduced-motion: reduce) {
        /* Near-instant (not none) so entrance animations still settle on
           their final frame instead of leaving elements stuck/invisible. */
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <h1>Keyframe animations</h1>

    <div class="row">
      <div class="box bounce">bounce</div>
      <div class="box spin">spin</div>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <h2>Skeleton loader</h2>
    <div class="skeleton"></div>
    <br />
    <div class="skeleton" style="width: 180px;"></div>
    <br />
    <div class="skeleton" style="width: 120px;"></div>

    <h2>Entrance: fade-up with stagger</h2>
    <div class="row">
      <div class="box fade-up">1</div>
      <div class="box fade-up" style="background:#16a085;">2</div>
      <div class="box fade-up" style="background:#e67e22;">3</div>
    </div>

    <h2>Pause on hover</h2>
    <div class="row">
      <div class="box pausable">hover me</div>
    </div>
  </body>
</html>
